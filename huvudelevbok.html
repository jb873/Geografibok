<body>
  <main class="sida elevbok-sida">

      <span class="skiljare" aria-hidden="true">›</span>

  <script>
    // Konfiguration för elevbok-samlad.js (boknivå).
    // ALLA_DELKAPITEL = single source of truth för bokens struktur.
    // Ordning enligt bokens innehållsförteckning: intro först, sedan I–VI.
    // Relativa dataSokvag (utan inledande slash) så det fungerar både i
    // Live Server och på GitHub Pages project-sidor.
    const VY_TYP = 'huvud';
    const ALLA_DELKAPITEL = [
      { id: 'introduktion', titel: 'INTRODUKTION', byggt: false },
      { id: 'kartografi', titel: 'KARTOGRAFI', byggt: false },
      { id: 'geologi', titel: 'GEOLOGI', byggt: false },
      { id: 'demografi', titel: 'DEMOGRAFI', byggt: true, dataSokvag: 'delkapitel/demografi/data/' },
      { id: 'ekonomisk_geografi', titel: 'EKONOMISK GEOGRAFI', byggt: false },
      { id: 'hallbar_utveckling', titel: 'HÅLLBAR UTVECKLING', byggt: false },
      { id: 'klimatologi_meteorologi', titel: 'KLIMATOLOGI & METEOROLOGI', byggt: false }
    ];
  </script>
  <script src="js/elevbok.js"></script>
  <script src="js/avsnitt.js"></script>
  <script src="js/egna-fragor.js" defer></script>
  <script src="js/elevbok-samlad.js" defer></script>
